# ParaBank Selenium framework configuration
# Resolution order: Maven system property -> environment variable -> this file -> default value in AppConfig.
# Example: mvn clean test -Denv=qa -Dbrowser=firefox -Dheadless=true

# Environment name used to pick the base URL below.
env=qa

# Environment URLs
qa.base.url=https://parabank.parasoft.com/parabank/index.htm?ConnType=JDBC
staging.base.url=https://parabank.parasoft.com/parabank/index.htm?ConnType=JDBC

# Browser configuration: chrome, firefox, edge
browser=chrome
headless=false
maximize.window=true
window.width=1440
window.height=900

# Wait configuration in seconds
# Industry preference: keep implicit wait at 0 and rely on explicit waits in page objects.
implicit.wait.seconds=0
explicit.wait.seconds=15
page.load.timeout.seconds=30
# ParaBank account overview can sometimes load account rows slower than the page header.
account.data.timeout.seconds=45

# ParaBank can retain old users in its shared demo database.
# Retry with a new generated username if a duplicate username appears during positive registration.
registration.retry.count=3

# Test data configuration
# Do not put real production credentials here. These are disposable ParaBank test values only.
default.password=Password@123
invalid.username=invalid_user_12345
invalid.password=wrongPassword

# Evidence configuration
screenshot.on.failure=true
page.source.on.failure=true
artifacts.dir=target/test-artifacts

# Optional browser tuning
accept.insecure.certs=true
